<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Edge Lab</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <h1 class="logo">⚽ Edge Lab</h1>
    <span class="tagline">世界杯预测实验室</span>
  </div>
</header>

<main id="app">
  <section class="loading" id="loading">
    <div class="spinner"></div>
    <p>加载预测数据...</p>
  </section>

  <section class="summary-bar" id="summary" style="display:none">
    <div class="summary-item">
      <span class="sum-label">模型</span>
      <span class="sum-value" id="sum-model">—</span>
    </div>
    <div class="summary-item">
      <span class="sum-label">Brier WDL</span>
      <span class="sum-value" id="sum-brier-wdl">—</span>
    </div>
    <div class="summary-item">
      <span class="sum-label">Brier O/U</span>
      <span class="sum-value" id="sum-brier-ou">—</span>
    </div>
  </section>

  <section class="controls" id="controls" style="display:none">
    <div class="checkpoint-tabs" id="checkpoint-tabs"></div>
  </section>

  <section class="match-list" id="matches" style="display:none"></section>
</main>

<footer class="footer">
  <p>World Cup Edge Lab &mdash; 基于双变量泊松分布的足球预测模型</p>
</footer>

<script src="/app.js"></script>
</body>
</html>
